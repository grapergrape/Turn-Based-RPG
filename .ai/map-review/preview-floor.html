<!DOCTYPE html>
<!-- Dev-only: a patch of one floor style, clean (no mood), for texture review. -->
<html>
<head>
<meta charset="utf-8">
<base href="/">
<style>html,body{margin:0;padding:0;background:#000;}canvas{display:block;image-rendering:pixelated;}</style>
</head>
<body>
<canvas id="c"></canvas>
<script type="module">
window.onerror = (msg) => { document.title = 'CAPTURE-ERROR'; document.body.textContent = String(msg); };
import * as P from '/src/render/PixelPrimitives.js';
import { PALETTE } from '/src/render/palette.js';
import { gridToScreen } from '/src/render/isoMath.js';
try {
  const params = new URLSearchParams(location.search);
  const SCALE = Number(params.get('scale') ?? '4');
  const STYLE = params.get('style') ?? 'stone';
  const N = Number(params.get('n') ?? '7');
  const MOOD = params.get('mood') === '1';
  const canvas = document.getElementById('c');
  const W = (N + 2) * 64, H = (N + 2) * 32 + 40;
  canvas.width = W * SCALE; canvas.height = H * SCALE;
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.fillStyle = PALETTE.void; ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.scale(SCALE, SCALE);
  const origin = { x: W / 2, y: 30 };
  for (let gy = 0; gy < N; gy += 1)
    for (let gx = 0; gx < N; gx += 1) {
      const s = gridToScreen(gx, gy, 0, origin);
      P.drawStyledFloorCell(ctx, s.x, s.y, gx, gy, STYLE);
    }
  if (MOOD) {
    ctx.save(); ctx.globalCompositeOperation = 'multiply'; ctx.globalAlpha = 0.4;
    ctx.fillStyle = '#10141c'; ctx.fillRect(0, 0, W, H); ctx.restore();
  }
  ctx.font = '10px monospace'; ctx.fillStyle = '#c8b89a';
  ctx.fillText('floor: ' + STYLE + (MOOD ? ' (mood)' : ''), 6, H - 8);
  document.title = 'CAPTURE-READY';
} catch (e) { document.title = 'CAPTURE-ERROR'; document.body.textContent = String(e?.stack ?? e); }
</script>
</body>
</html>
