<!DOCTYPE html>
<!-- Dev-only harness: renders every journal section through the real
     UIRenderer. Not part of the game. -->
<html>
<head>
<meta charset="utf-8">
<base href="/">
<style>html,body{margin:0;padding:0;background:#000;}canvas{display:block;image-rendering:pixelated;}</style>
</head>
<body>
<canvas id="c" width="1280" height="960"></canvas>
<script type="module">
import { JOURNAL_SECTIONS } from '/src/core/JournalState.js';
import { buildCharacterSheet } from '/src/core/Progression.js';
import { buildTechniqueSheet } from '/src/core/TechniqueSystem.js';
import { UIRenderer } from '/src/render/UIRenderer.js';

async function loadJson(path) {
  const response = await fetch(path);
  if (!response.ok) throw new Error(`Could not load ${path}: ${response.status}`);
  return response.json();
}

function previewMap() {
  const width = 30;
  const height = 18;
  const cells = [];
  for (let y = 0; y < height; y += 1) {
    for (let x = 0; x < width; x += 1) {
      const chapelWall = (x === 12 || x === 20) && y >= 3 && y <= 13;
      const crossWall = y === 3 && x >= 12 && x <= 20;
      const sealed = x >= 24 || y >= 16;
      cells.push({
        x,
        y,
        key: `${x},${y}`,
        explored: !sealed,
        hidden: false,
        type: chapelWall || crossWall ? 'wall' : (x === 17 && y === 10 ? 'blocked' : 'floor')
      });
    }
  }
  return {
    id: 'ash-chapel-breach',
    name: 'Quarantine House Seventeen',
    width,
    height,
    exploredCount: cells.filter((cell) => cell.explored).length,
    totalCells: cells.length,
    cells,
    markers: [
      { id: 'player', kind: 'player', label: 'Junia Carbo', x: 15, y: 12, reveal: 'always' },
      { id: 'quest:bell', kind: 'quest', label: 'Upper Bell', x: 18, y: 5, reveal: 'explored' },
      { id: 'dialogue:tomas', kind: 'dialogue', label: 'Tobias Porta', x: 10, y: 13, reveal: 'explored' },
      { id: 'danger:cellar', kind: 'danger', label: 'Opened Cellar', x: 16, y: 9, reveal: 'explored' },
      { id: 'exit:road', kind: 'exit', label: 'Hallowfen Road', x: 2, y: 8, reveal: 'explored' },
      { id: 'search:office', kind: 'search', label: 'Warden Office', x: 19, y: 12, reveal: 'explored' }
    ],
    player: { x: 15, y: 12 }
  };
}

try {
  const params = new URLSearchParams(location.search);
  const requested = (params.get('section') ?? 'QUESTS').toUpperCase();
  const numericSection = Number(requested);
  const section = Number.isInteger(numericSection) && requested !== ''
    ? Math.max(0, Math.min(JOURNAL_SECTIONS.length - 1, numericSection))
    : Math.max(0, JOURNAL_SECTIONS.indexOf(requested));
  const selected = Math.max(0, Number(params.get('selected') ?? 0) || 0);
  const turnProgress = Math.max(0, Math.min(1, Number(params.get('turn') ?? 0) || 0));
  const turnDirection = Number(params.get('direction') ?? 1) < 0 ? -1 : 1;

  const [actor, level, techniqueIndex] = await Promise.all([
    loadJson('/data/actors/mara-vey.json'),
    loadJson('/data/levels/ash_chapel_breach.json'),
    loadJson('/data/techniques/index.json')
  ]);
  const definitions = await Promise.all(
    techniqueIndex.ids.map((id) => loadJson(`/data/techniques/${id}.json`))
  );
  const techniqueDefs = Object.fromEntries(definitions.map((definition) => [definition.id, definition]));

  actor.progression = {
    ...actor.progression,
    level: 7,
    xp: 690,
    build: 'investigator',
    primaryPoints: 1,
    activeTechniquePoints: 2,
    passiveTechniquePoints: 1,
    techniques: ['aimed-shot', 'case-file', 'field-measure', 'study-target'],
    primaries: {
      body: 5,
      agility: 6,
      eye: 7,
      intelligence: 7,
      religion: 6,
      voice: 5,
      nerve: 7
    },
    trace: 2,
    iconRisk: 'penitent-bastion',
    scarPoints: 1
  };
  const character = buildCharacterSheet(actor);
  const techniques = buildTechniqueSheet(actor.progression, techniqueDefs, {
    itemIds: ['field-dressing'],
    equipment: { sidearm: 'censure-sidearm', armor: 'scarred-leather-vest' }
  });

  const quests = [
    {
      title: 'The Ash Chapel',
      task: 'Ring the chapel bell',
      note: 'The cell is broken. The road office still needs the upper bell before it can enter the house.',
      complete: false,
      objectives: [
        { text: 'Search the chapel settlement and identify the cell.', done: true },
        { text: 'Break the Choir of the Open Wound.', done: true },
        { text: 'Bring Tobias Porta to the upper bell.', active: true },
        { text: 'Investigate why the Hallowfen checkpoints stopped answering.', lead: true }
      ]
    },
    {
      title: 'The Engine Rut',
      task: 'Trace the abandoned route',
      note: 'A Penitent Engine reached the chapel door, then turned back. Find what made a war monk refuse the road.',
      complete: false,
      objectives: [
        { text: 'Record the machine prints outside the east door.', done: true },
        { text: 'Ask the road office who last saw the Engine.', active: true }
      ]
    }
  ];
  const findings = [
    'The cult ledger names the Choir of the Open Wound and marks Hallowfen as its next ground.',
    'The altar was set for feeding. Fresh cord and opened reliquary metal remained beside it.',
    'A hidden service cellar runs beneath the split barrel in the nave.',
    'The warden used Quarantine House Seventeen to hold tithe dissenters after the Stilling.',
    'A Penitent Engine stood in the east doorway, then turned back without entering.',
    'Tobias Porta knows the old bell frame and does not trust the repaired rope.',
    'The moved families were taken before the chapel guards were opened.',
    'The north wall road has not answered three Censure bell calls.',
    'Micah lost his blue ball when Ruth kicked it down the hall. The children are not allowed past the survivor camp.',
    'You found the blue ball in the lower catacombs. Micah is waiting near the stair.',
    'The Remnant will hear the chapel bell, but Hallowfen checkpoints still do not answer. Follow the wall road and find who silenced them.',
    'A child in the hidden catacombs keeps watching the dark lower hall.'
  ];
  const factions = (level.codex ?? []).map((entry, index) => ({
    name: entry.name,
    kind: entry.kind,
    summary: entry.summary,
    facts: entry.facts,
    known: index < 4
  }));

  const renderer = new UIRenderer();
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  ctx.scale(2, 2);
  renderer.draw(ctx, {
    screen: 'journal',
    actorName: 'MARA VEY',
    actorRole: 'CULT BREAKER, ASHEN CENSURE',
    mode: 'EXPLORE',
    hp: 17,
    maxHp: 22,
    ap: 7,
    maxAp: 7,
    carryWeight: 12.4,
    maxCarryWeight: 30,
    inventoryItems: [],
    controls: [],
    cursor: null,
    log: ['The field ledger lies open.'],
    journal: {
      section,
      sections: JOURNAL_SECTIONS,
      turn: turnProgress > 0 && turnProgress < 1
        ? { from: Math.max(0, section - 1), direction: turnDirection, progress: turnProgress }
        : null,
      factionIndex: Math.min(selected, Math.max(0, factions.filter((entry) => entry.known).length - 1)),
      evidenceIndex: selected,
      primaryIndex: Math.min(selected, Math.max(0, character.primaries.length - 1)),
      time: {
        dateLabel: 'FIELD DAY 4, YEAR 130 AFTER DESCENT',
        timeLabel: '21:20',
        phaseLabel: 'NIGHT'
      },
      map: previewMap(),
      quests,
      findings,
      factions,
      character,
      techniques: {
        activePoints: character.activeTechniquePoints,
        passivePoints: character.passiveTechniquePoints,
        selectedIndex: Math.min(selected, Math.max(0, techniques.length - 1)),
        entries: techniques
      }
    }
  });
  document.title = 'CAPTURE-READY';
} catch (error) {
  document.title = 'CAPTURE-ERROR';
  document.body.textContent = String(error?.stack ?? error);
}
</script>
</body>
</html>
