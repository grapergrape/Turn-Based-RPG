<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Host RPG — Ash Chapel Breach</title>
    <style>
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: #050505;
        color: #c8b99a;
        font-family: "Courier New", monospace;
      }

      main {
        display: grid;
        place-items: center;
        min-height: 100vh;
      }

      canvas {
        image-rendering: pixelated;
        image-rendering: crisp-edges;
        background: #050505;
        display: block;
      }

      #status {
        position: fixed;
        bottom: 4px;
        left: 6px;
        font-size: 11px;
        opacity: 0.6;
      }
    </style>
  </head>
  <body>
    <main>
      <canvas id="game" width="640" height="480" aria-label="The Host RPG isometric scene"></canvas>
    </main>
    <div id="status"></div>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
